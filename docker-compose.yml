services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: eka-postgres
    environment:
      POSTGRES_DB: project_eka
      POSTGRES_USER: ka_user
      POSTGRES_PASSWORD: ka_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ka_user -d project_eka"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Weaviate ────────────────────────────────────────────────────────────────
  # No vectorizer module — Spring AI sends pre-computed Ollama embeddings
  weaviate:
    image: semitechnologies/weaviate:1.25.0
    container_name: eka-weaviate
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Ollama ──────────────────────────────────────────────────────────────────
  # Pull required models after first start:
  #   docker exec eka-ollama ollama pull nomic-embed-text
  #   docker exec eka-ollama ollama pull qwen3
  ollama:
    image: ollama/ollama:latest
    container_name: eka-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment for GPU support (requires NVIDIA Container Toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  weaviate_data:
  ollama_data:
