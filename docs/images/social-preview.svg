<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640"
     font-family="'Segoe UI', system-ui, -apple-system, sans-serif">

  <rect width="1280" height="640" fill="#ffffff"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="640" fill="#2563eb"/>

  <!-- Blue top stripe -->
  <rect x="0" y="0" width="1280" height="8" fill="#2563eb"/>

  <!-- ── LEFT: Branding ───────────────────────────────────────── -->

  <!-- Hexagon -->
  <polygon points="140,130 196,162 196,226 140,258 84,226 84,162"
           fill="none" stroke="#2563eb" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="140,148 180,171 180,217 140,240 100,217 100,171"
           fill="none" stroke="#bfdbfe" stroke-width="2" stroke-linejoin="round"/>
  <text x="140" y="208" text-anchor="middle" font-size="44" font-weight="700" fill="#0f172a">EKA</text>

  <!-- Title -->
  <text x="228" y="185" font-size="72" font-weight="700" letter-spacing="-2" fill="#0f172a">Project EKA</text>
  <text x="228" y="230" font-size="28" font-weight="400" fill="#64748b">Enterprise Knowledge Assistant</text>

  <!-- Divider -->
  <line x1="80" y1="280" x2="620" y2="280" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Tagline -->
  <text x="80" y="318" font-size="20" fill="#475569">
    Hexagonal Architecture · Spring AI 1.0 · On-premises RAG
  </text>
  <text x="80" y="348" font-size="20" fill="#475569">
    No external API dependencies · Full data ownership
  </text>

  <!-- Chips row 1 -->
  <rect x="80"  y="388" width="140" height="36" rx="18" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="150" y="411" text-anchor="middle" font-size="14" font-weight="600" fill="#15803d">Spring Boot 3.5</text>

  <rect x="232" y="388" width="124" height="36" rx="18" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="294" y="411" text-anchor="middle" font-size="14" font-weight="600" fill="#15803d">Spring AI 1.0</text>

  <rect x="368" y="388" width="118" height="36" rx="18" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="427" y="411" text-anchor="middle" font-size="14" font-weight="600" fill="#c2410c">Weaviate 1.25</text>

  <!-- Chips row 2 -->
  <rect x="80"  y="440" width="92" height="36" rx="18" fill="#f8fafc" stroke="#64748b" stroke-width="1.5"/>
  <text x="126" y="463" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">Ollama</text>

  <rect x="184" y="440" width="132" height="36" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="250" y="463" text-anchor="middle" font-size="14" font-weight="600" fill="#1d4ed8">PostgreSQL 16</text>

  <rect x="328" y="440" width="128" height="36" rx="18" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="392" y="463" text-anchor="middle" font-size="14" font-weight="600" fill="#b91c1c">Apache Tika</text>

  <!-- Status -->
  <rect x="80"  y="502" width="168" height="32" rx="16" fill="#dcfce7"/>
  <text x="164" y="522" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">104 Tests Passing</text>

  <rect x="260" y="502" width="116" height="32" rx="16" fill="#eff6ff"/>
  <text x="318" y="522" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">v0.4.0 · MIT</text>

  <!-- ── RIGHT: Architecture illustration ─────────────────────── -->

  <rect x="680" y="80" width="560" height="480" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="960" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#94a3b8" letter-spacing="1.5">HEXAGONAL ARCHITECTURE</text>
  <line x1="700" y1="128" x2="1220" y2="128" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Infrastructure -->
  <rect x="700" y="140" width="520" height="370" rx="10" fill="#f8fafc" stroke="#2563eb" stroke-width="2"/>
  <text x="730" y="164" font-size="12" font-weight="700" fill="#2563eb" letter-spacing="0.5">INFRASTRUCTURE</text>

  <!-- Application -->
  <rect x="770" y="178" width="380" height="296" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="800" y="200" font-size="12" font-weight="700" fill="#2563eb" letter-spacing="0.5">APPLICATION</text>

  <!-- Domain -->
  <rect x="840" y="216" width="240" height="214" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="960" y="244" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8" letter-spacing="0.5">DOMAIN</text>
  <text x="960" y="264" text-anchor="middle" font-size="11" fill="#2563eb">Pure Java · Zero deps</text>

  <rect x="858" y="282" width="96" height="32" rx="5" fill="#bfdbfe" stroke="#2563eb" stroke-width="1"/>
  <text x="906" y="303" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">document</text>

  <rect x="966" y="282" width="96" height="32" rx="5" fill="#bfdbfe" stroke="#2563eb" stroke-width="1"/>
  <text x="1014" y="303" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">conversation</text>

  <rect x="858" y="328" width="96" height="32" rx="5" fill="#bfdbfe" stroke="#2563eb" stroke-width="1"/>
  <text x="906" y="349" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">query</text>

  <rect x="966" y="328" width="96" height="32" rx="5" fill="#bfdbfe" stroke="#2563eb" stroke-width="1"/>
  <text x="1014" y="349" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">user</text>

  <!-- Port interfaces -->
  <rect x="858" y="378" width="204" height="36" rx="5" fill="#ffffff" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="960" y="396" text-anchor="middle" font-size="10" font-weight="700" fill="#1d4ed8">« Port Interfaces »</text>
  <text x="960" y="410" text-anchor="middle" font-size="9" fill="#3b82f6">FileStorage · VectorStore · EmbeddingProvider</text>

  <!-- Left adapters -->
  <rect x="708" y="196" width="54" height="40" rx="5" fill="#fff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="735" y="213" text-anchor="middle" font-size="10" font-weight="600" fill="#0f172a">PgSQL</text>
  <text x="735" y="228" text-anchor="middle" font-size="9" fill="#64748b">JPA</text>

  <rect x="708" y="248" width="54" height="40" rx="5" fill="#fff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="735" y="265" text-anchor="middle" font-size="10" font-weight="600" fill="#0f172a">Weaviate</text>
  <text x="735" y="280" text-anchor="middle" font-size="9" fill="#64748b">Vector</text>

  <rect x="708" y="300" width="54" height="40" rx="5" fill="#fff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="735" y="317" text-anchor="middle" font-size="10" font-weight="600" fill="#0f172a">Ollama</text>
  <text x="735" y="332" text-anchor="middle" font-size="9" fill="#64748b">Embed</text>

  <!-- Right adapters -->
  <rect x="1158" y="196" width="54" height="40" rx="5" fill="#fff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="1185" y="213" text-anchor="middle" font-size="10" font-weight="600" fill="#0f172a">Tika</text>
  <text x="1185" y="228" text-anchor="middle" font-size="9" fill="#64748b">Parser</text>

  <rect x="1158" y="248" width="54" height="40" rx="5" fill="#fff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="1185" y="265" text-anchor="middle" font-size="10" font-weight="600" fill="#0f172a">Storage</text>
  <text x="1185" y="280" text-anchor="middle" font-size="9" fill="#64748b">Local FS</text>

  <rect x="1158" y="300" width="54" height="40" rx="5" fill="#fff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="1185" y="317" text-anchor="middle" font-size="10" font-weight="600" fill="#0f172a">Events</text>
  <text x="1185" y="332" text-anchor="middle" font-size="9" fill="#64748b">Spring</text>

  <text x="960" y="532" text-anchor="middle" font-size="10" fill="#94a3b8">8 ArchUnit layering rules enforced at build time</text>

</svg>
