<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240"
     font-family="'Segoe UI', system-ui, -apple-system, sans-serif">

  <!-- Hexagon mark — references hexagonal architecture -->
  <polygon points="120,18 204,66 204,162 120,210 36,162 36,66"
           fill="none" stroke="#2563eb" stroke-width="4" stroke-linejoin="round"/>

  <!-- Inner accent line -->
  <polygon points="120,34 190,75 190,157 120,198 50,157 50,75"
           fill="none" stroke="#bfdbfe" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- EKA logotype -->
  <text x="120" y="132" text-anchor="middle"
        font-size="56" font-weight="700" letter-spacing="-1"
        fill="#0f172a">EKA</text>

  <!-- Subtitle -->
  <text x="120" y="228" text-anchor="middle"
        font-size="11" font-weight="400" letter-spacing="1.5"
        fill="#64748b">ENTERPRISE KNOWLEDGE ASSISTANT</text>

</svg>
