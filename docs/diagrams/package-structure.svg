<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 720" width="760" height="720"
     font-family="'Segoe UI', system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="760" height="720" fill="#ffffff"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- TITLE                                                   -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <text x="380" y="33" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Project EKA — Package Structure</text>
  <text x="380" y="52" text-anchor="middle" font-size="11" fill="#64748b">Hexagonal Architecture (Ports &amp; Adapters)</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- API LAYER (inbound adapter, future)                     -->
  <!-- Sits ABOVE the concentric rings — primary/driving side  -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="290" y="64" width="200" height="50" rx="8" fill="#fafafa" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="390" y="84" text-anchor="middle" font-size="11" font-weight="700" fill="#94a3b8">API LAYER  (Future)</text>
  <text x="390" y="100" text-anchor="middle" font-size="10" fill="#cbd5e1">REST Controllers · DTOs · v0.6.0</text>

  <!-- Label: inbound adapter -->
  <text x="506" y="78" font-size="9" fill="#cbd5e1" font-weight="600">INBOUND</text>
  <text x="506" y="91" font-size="9" fill="#cbd5e1" font-weight="600">ADAPTER</text>

  <!-- Arrow from API INTO Application (dashed, inward direction) -->
  <line x1="390" y1="114" x2="390" y2="136" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-gray)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- INFRASTRUCTURE ring (outermost)                         -->
  <!-- x=28 y=138 w=704 h=488                                  -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="28" y="138" width="704" height="488" rx="12" fill="#f8fafc" stroke="#2563eb" stroke-width="1.5"/>
  <text x="76" y="161" font-size="11" font-weight="700" fill="#2563eb" letter-spacing="0.5">INFRASTRUCTURE</text>
  <text x="76" y="177" font-size="10" fill="#3b82f6">Outbound Adapters · JPA · Weaviate · Ollama · Tika · Storage · Events</text>

  <!-- Label: outbound adapter (right side) -->
  <text x="690" y="161" font-size="9" fill="#94a3b8" font-weight="600" text-anchor="end">OUTBOUND</text>
  <text x="690" y="174" font-size="9" fill="#94a3b8" font-weight="600" text-anchor="end">ADAPTERS</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- APPLICATION ring                                        -->
  <!-- x=128 y=190 w=504 h=384                                 -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="128" y="190" width="504" height="384" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="172" y="212" font-size="11" font-weight="700" fill="#2563eb" letter-spacing="0.5">APPLICATION</text>
  <text x="172" y="227" font-size="10" fill="#3b82f6">Use Cases · Commands · Domain Events · Application Services</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- DOMAIN core                                             -->
  <!-- x=228 y=248 w=304 h=282                                 -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="228" y="248" width="304" height="282" rx="10" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="380" y="272" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" letter-spacing="0.5">DOMAIN</text>
  <text x="380" y="289" text-anchor="middle" font-size="10" fill="#2563eb">Pure Java · Zero framework dependencies</text>

  <!-- Domain sub-packages (2 rows of 2) -->
  <rect x="244" y="302" width="118" height="36" rx="5" fill="#bfdbfe" stroke="#2563eb" stroke-width="1"/>
  <text x="303" y="317" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">document</text>
  <text x="303" y="331" text-anchor="middle" font-size="9" fill="#3b82f6">Document · Chunk</text>

  <rect x="398" y="302" width="118" height="36" rx="5" fill="#bfdbfe" stroke="#2563eb" stroke-width="1"/>
  <text x="457" y="317" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">shared</text>
  <text x="457" y="331" text-anchor="middle" font-size="9" fill="#3b82f6">TenantId · UserId</text>

  <rect x="244" y="350" width="118" height="36" rx="5" fill="#bfdbfe" stroke="#2563eb" stroke-width="1"/>
  <text x="303" y="365" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">user</text>
  <text x="303" y="379" text-anchor="middle" font-size="9" fill="#3b82f6">User aggregate</text>

  <rect x="398" y="350" width="118" height="36" rx="5" fill="#bfdbfe" stroke="#2563eb" stroke-width="1"/>
  <text x="457" y="365" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">conversation</text>
  <text x="457" y="379" text-anchor="middle" font-size="9" fill="#3b82f6">Chat · Query</text>

  <!-- Port Interfaces box (dashed border = boundary between domain and infra) -->
  <rect x="244" y="402" width="272" height="48" rx="5" fill="#ffffff" stroke="#2563eb" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="380" y="421" text-anchor="middle" font-size="10" font-weight="700" fill="#1d4ed8">« Port Interfaces »</text>
  <text x="380" y="436" text-anchor="middle" font-size="9" fill="#3b82f6">FileStorage · DocumentParser</text>
  <text x="380" y="449" text-anchor="middle" font-size="9" fill="#3b82f6">VectorStore · EmbeddingProvider</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- INFRASTRUCTURE ADAPTERS (left side — 3 adapters)        -->
  <!-- These are inside the Infra ring, left of Application    -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="42" y="262" width="78" height="50" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="81" y="283" text-anchor="middle" font-size="10" font-weight="600" fill="#0f172a">PostgreSQL</text>
  <text x="81" y="298" text-anchor="middle" font-size="9" fill="#64748b">JPA / Flyway</text>

  <rect x="42" y="332" width="78" height="50" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="81" y="353" text-anchor="middle" font-size="10" font-weight="600" fill="#0f172a">Weaviate</text>
  <text x="81" y="368" text-anchor="middle" font-size="9" fill="#64748b">Vector Store</text>

  <rect x="42" y="402" width="78" height="50" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="81" y="423" text-anchor="middle" font-size="10" font-weight="600" fill="#0f172a">Ollama</text>
  <text x="81" y="438" text-anchor="middle" font-size="9" fill="#64748b">Embedding</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- INFRASTRUCTURE ADAPTERS (right side — 3 adapters)       -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="640" y="262" width="78" height="50" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="679" y="283" text-anchor="middle" font-size="10" font-weight="600" fill="#0f172a">Apache Tika</text>
  <text x="679" y="298" text-anchor="middle" font-size="9" fill="#64748b">Doc Parser</text>

  <rect x="640" y="332" width="78" height="50" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="679" y="353" text-anchor="middle" font-size="10" font-weight="600" fill="#0f172a">File Storage</text>
  <text x="679" y="368" text-anchor="middle" font-size="9" fill="#64748b">Local FS</text>

  <rect x="640" y="402" width="78" height="50" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="679" y="423" text-anchor="middle" font-size="10" font-weight="600" fill="#0f172a">Events</text>
  <text x="679" y="438" text-anchor="middle" font-size="9" fill="#64748b">Spring Events</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ADAPTER → APPLICATION BOUNDARY ARROWS                   -->
  <!-- Arrows point FROM adapters INTO Application ring,       -->
  <!-- representing adapters calling Application use cases     -->
  <!-- (and implementing Domain ports for outbound calls)      -->
  <!-- Left adapters → right (into Application x=128)          -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="120" y1="287" x2="126" y2="287" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="120" y1="357" x2="126" y2="357" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="120" y1="427" x2="126" y2="427" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Right adapters → left (into Application x=632) -->
  <line x1="640" y1="287" x2="634" y2="287" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="640" y1="357" x2="634" y2="357" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="640" y1="427" x2="634" y2="427" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- "implements port" micro-labels on the arrows -->
  <text x="123" y="284" font-size="7" fill="#93c5fd" text-anchor="middle">port</text>
  <text x="637" y="284" font-size="7" fill="#93c5fd" text-anchor="middle">port</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- DEPENDENCY RULE                                         -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <text x="380" y="650" text-anchor="middle" font-size="10" fill="#64748b">
    Dependency rule: outer layers depend on inner layers — Domain has no outward dependencies
  </text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LEGEND                                                  -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="28" y="664" width="380" height="40" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="44" y="677" width="18" height="12" rx="2" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="68" y="687" font-size="10" fill="#0f172a">Implemented</text>

  <rect x="148" y="677" width="18" height="12" rx="2" fill="#fafafa" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="172" y="687" font-size="10" fill="#0f172a">Future</text>

  <rect x="232" y="677" width="18" height="12" rx="2" fill="#bfdbfe" stroke="#2563eb" stroke-width="1"/>
  <text x="256" y="687" font-size="10" fill="#0f172a">Domain sub-package</text>

  <rect x="352" y="677" width="18" height="12" rx="2" fill="#ffffff" stroke="#2563eb" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="376" y="687" font-size="10" fill="#0f172a">Port</text>

</svg>
