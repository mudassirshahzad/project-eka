spring:
  application:
    name: project-eka

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/project_eka}
    username: ${DB_USERNAME:ka_user}
    password: ${DB_PASSWORD:ka_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: KaHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 110MB

  ai:
    ollama:
      base-url: ${OLLAMA_URL:http://localhost:11434}
      chat:
        model: ${OLLAMA_CHAT_MODEL:qwen3}
        options:
          temperature: 0.1
          num-ctx: 8192
      embedding:
        model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
    vectorstore:
      weaviate:
        scheme: ${WEAVIATE_SCHEME:http}
        host: ${WEAVIATE_HOST:localhost:8080}
        api-key: ${WEAVIATE_API_KEY:}
        object-class: DocumentChunk
        consistency-level: ONE
        metadata-fields:
          - name: chunkId
            type: TEXT
          - name: documentId
            type: TEXT
          - name: tenantId
            type: TEXT
          - name: sequenceNumber
            type: NUMBER
          - name: department
            type: TEXT
          - name: classification
            type: TEXT
          - name: tags
            type: TEXT
          - name: pageNumber
            type: NUMBER
          - name: sectionTitle
            type: TEXT
          - name: chunkingStrategy
            type: TEXT
          - name: tokenCount
            type: NUMBER

security:
  jwt:
    secret-key: ${JWT_SECRET_KEY}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}

app:
  ingestion:
    chunk-size: 512
    chunk-overlap: 64
    embedding-batch-size: 32
  retrieval:
    top-k-candidates: 20
    top-k-results: 5
    hybrid-alpha: 0.75
    rrf-k: 60
  conversation:
    memory-window-size: 10
  storage:
    document-root: ${DOCUMENT_STORAGE_ROOT:/data/documents}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.mudassir.eka: INFO
    org.springframework.ai: INFO
    org.hibernate.SQL: WARN

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
  ai:
    ollama:
      base-url: http://localhost:11434

logging:
  level:
    com.mudassir.eka: DEBUG
    org.springframework.ai: DEBUG

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:tc:postgresql:16:///project_eka_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  flyway:
    clean-on-validation-error: true
