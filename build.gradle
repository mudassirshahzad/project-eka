plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.0'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.mudassir'
version = '1.0.0-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

ext {
    springAiVersion        = '1.0.0'
    jjwtVersion            = '0.12.6'
    tikaVersion            = '2.9.2'
    mapstructVersion       = '1.6.3'
    archunitVersion        = '1.3.0'
    lombokMapstructBinding = '0.2.0'
}

repositories {
    mavenCentral()
}

dependencyManagement {
    imports {
        mavenBom "org.springframework.ai:spring-ai-bom:${springAiVersion}"
    }
}

dependencies {

    // ── Spring Boot ────────────────────────────────────────────────────────
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-aop'

    // ── Spring AI ──────────────────────────────────────────────────────────
    implementation 'org.springframework.ai:spring-ai-ollama-spring-boot-starter'
    implementation 'org.springframework.ai:spring-ai-weaviate-store-spring-boot-starter'

    // ── Database ───────────────────────────────────────────────────────────
    runtimeOnly 'org.postgresql:postgresql'
    implementation 'org.flywaydb:flyway-core'
    implementation 'org.flywaydb:flyway-database-postgresql'

    // ── JWT ────────────────────────────────────────────────────────────────
    implementation "io.jsonwebtoken:jjwt-api:${jjwtVersion}"
    runtimeOnly   "io.jsonwebtoken:jjwt-impl:${jjwtVersion}"
    runtimeOnly   "io.jsonwebtoken:jjwt-jackson:${jjwtVersion}"

    // ── Apache Tika ────────────────────────────────────────────────────────
    implementation "org.apache.tika:tika-core:${tikaVersion}"
    implementation "org.apache.tika:tika-parsers-standard-package:${tikaVersion}"

    // ── Lombok (compile-only — excluded from the final JAR) ────────────────
    compileOnly         'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'
    testCompileOnly         'org.projectlombok:lombok'
    testAnnotationProcessor 'org.projectlombok:lombok'

    // ── MapStruct (order matters: lombok → binding → mapstruct) ───────────
    implementation      "org.mapstruct:mapstruct:${mapstructVersion}"
    annotationProcessor "org.projectlombok:lombok-mapstruct-binding:${lombokMapstructBinding}"
    annotationProcessor "org.mapstruct:mapstruct-processor:${mapstructVersion}"

    // ── Observability ──────────────────────────────────────────────────────
    implementation 'io.micrometer:micrometer-registry-prometheus'

    // ── Test ───────────────────────────────────────────────────────────────
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation "com.tngtech.archunit:archunit-junit5:${archunitVersion}"
    testImplementation 'org.testcontainers:postgresql'
    testImplementation 'org.testcontainers:junit-jupiter'
}

// ── Compiler: enable Java 21 preview features ──────────────────────────────
tasks.withType(JavaCompile).configureEach {
    options.compilerArgs << '--enable-preview'
}

// ── Tests ──────────────────────────────────────────────────────────────────
tasks.withType(Test).configureEach {
    useJUnitPlatform()
    jvmArgs '--enable-preview'
}

// ── Local dev run ──────────────────────────────────────────────────────────
tasks.named('bootRun') {
    jvmArgs '--enable-preview'
}
